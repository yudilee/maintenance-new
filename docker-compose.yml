version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maintenance_new
    restart: unless-stopped
    ports:
      - "8087:80"
    volumes:
      - maintenance_new_storage:/var/www/html/storage/app
    networks:
      - maintenance_sail
    environment:
      - APP_NAME=Maintenance_new
      - APP_ENV=production
      - APP_DEBUG=true
      - APP_URL=https://sdp-dashboard.hartonomotor-group.com
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=sdp
      - DB_USERNAME=sdp
      - DB_PASSWORD=password
      - SESSION_DRIVER=file
      - CACHE_STORE=file
      - TZ=Asia/Jakarta

  # Scheduler for automatic Odoo sync
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maintenance_new_scheduler
    restart: unless-stopped
    entrypoint: []
    command: >
      sh -c "while true; do 
        echo '[Scheduler] Running at '$(date);
        php artisan schedule:run --verbose --no-interaction;
        sleep 60;
      done"
    volumes:
      - maintenance_new_storage:/var/www/html/storage/app
    networks:
      - maintenance_sail
    environment:
      - APP_NAME=Maintenance_new
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://sdp-dashboard.hartonomotor-group.com
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=sdp
      - DB_USERNAME=sdp
      - DB_PASSWORD=password
      - SESSION_DRIVER=file
      - CACHE_STORE=file
      - TZ=Asia/Jakarta
    depends_on:
      - app
      - mysql

  mysql:
    image: mysql:8.0
    container_name: maintenance_new_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sdp
      MYSQL_USER: sdp
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - maintenance_new_mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - maintenance_sail
    ports:
      - "3307:3306"

volumes:
  maintenance_new_storage:
  maintenance_new_mysql_data:


networks:
  maintenance_sail:
    driver: bridge
