version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdp_dashboard
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - sdp_storage:/var/www/html/storage/app
    environment:
      - APP_NAME=SDP_Dashboard
      - APP_ENV=production
      - APP_DEBUG=true
      - APP_URL=https://sdp-dashboard.hartonomotor-group.com
      - SESSION_DRIVER=file
      - SESSION_DRIVER=file
      - CACHE_STORE=file
      - TZ=Asia/Jakarta

  # Scheduler for automatic Odoo sync
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdp_scheduler
    restart: unless-stopped
    entrypoint: []
    command: >
      sh -c "while true; do 
        echo '[Scheduler] Running at '$(date);
        php artisan schedule:run --verbose --no-interaction;
        sleep 60;
      done"
    volumes:
      - sdp_storage:/var/www/html/storage/app
    environment:
      - APP_NAME=SDP_Dashboard
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://sdp-dashboard.hartonomotor-group.com
      - SESSION_DRIVER=file
      - SESSION_DRIVER=file
      - CACHE_STORE=file
      - TZ=Asia/Jakarta
    depends_on:
      - app

volumes:
  sdp_storage:
