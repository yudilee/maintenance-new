version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdp_dashboard
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - .:/var/www/html
      - sdp_storage:/var/www/html/storage/app
    networks:
      - maintenance_sail
    environment:
      - APP_NAME=SDP_Dashboard
      - APP_ENV=production
      - APP_DEBUG=true
      - APP_URL=https://sdp-dashboard.hartonomotor-group.com
      - SESSION_DRIVER=file
      - SESSION_DRIVER=file
      - CACHE_STORE=file
      - TZ=Asia/Jakarta

  # Scheduler for automatic Odoo sync
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdp_scheduler
    restart: unless-stopped
    entrypoint: []
    command: >
      sh -c "while true; do 
        echo '[Scheduler] Running at '$(date);
        php artisan schedule:run --verbose --no-interaction;
        sleep 60;
      done"
    volumes:
      - .:/var/www/html
      - sdp_storage:/var/www/html/storage/app
    networks:
      - maintenance_sail
    environment:
      - APP_NAME=SDP_Dashboard
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://sdp-dashboard.hartonomotor-group.com
      - SESSION_DRIVER=file
      - SESSION_DRIVER=file
      - CACHE_STORE=file
      - TZ=Asia/Jakarta
    depends_on:
      - app
      - mysql

  mysql:
    image: mysql:8.0
    container_name: sdp_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sdp
      MYSQL_USER: sdp
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - sdp_mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - maintenance_sail
    ports:
      - "3307:3306"

volumes:
  sdp_storage:
  sdp_mysql_data:


networks:
  maintenance_sail:
    external: true
